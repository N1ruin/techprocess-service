server:
  port: 8083

logging:
  level:
    root: ERROR

scheduler:
  outbox:
    batch-size: 10
    millis-delay: 5000

spring:
  application:
    name: techprocess-service
  config:
    activate:
      on-profile: docker
  data:
    mongodb:
      uri: mongodb://admin:admin@mongodb:27017/techprocess-service?authSource=admin
      auto-index-creation: true
      uuid-representation: standard
    redis:
      host: redis
  cache:
    type: redis
    redis:
      time-to-live: 60m
      cache-null-values: false
  # Брокер и безопасность
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.trusted.packages: '*'
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/techprocess-service-realm

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: techprocess-service